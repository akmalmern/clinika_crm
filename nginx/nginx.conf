# =============================================================================
# Klinika CRM — Nginx reverse proxy (TLS termination)
# =============================================================================
#   /        -> frontend (Next.js, :3001)
#   /api/    -> backend  (NestJS, :3000)  — webhook (Payme/Click), Swagger, API
#   80       -> 443 redirect (HTTPS majburiy)
# TLS sertifikatlar /etc/nginx/certs ga mount qilinadi (Let's Encrypt yoki self-signed).
# =============================================================================

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;
  server_tokens off;
  client_max_body_size 20m;   # fayl yuklash (tarif limiti backend'da)

  # Real IP + request-id (kuzatuv uchun) backend/log bilan bog'lanadi.
  log_format json escape=json '{"time":"$time_iso8601","remote_addr":"$remote_addr",'
    '"method":"$request_method","uri":"$request_uri","status":$status,'
    '"rt":$request_time,"req_id":"$request_id","ua":"$http_user_agent"}';
  access_log /var/log/nginx/access.log json;

  upstream backend {
    server backend:3000;
  }
  upstream frontend {
    server client:3001;
  }

  # HTTP -> HTTPS
  server {
    listen 80;
    server_name _;
    # Let's Encrypt HTTP-01 challenge uchun (ixtiyoriy):
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS
  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Xavfsizlik sarlavhalari (Helmet backend'da ham bor — bu qatlam qo'shimcha).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Backend API (webhook, Swagger, tashqi iste'molchilar).
    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
      proxy_read_timeout 60s;
    }

    # Frontend (Next.js) — qolgan hamma yo'l.
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-Id $request_id;
      proxy_read_timeout 60s;
    }
  }
}
