# =============================================================================
# Klinika CRM — PRODUCTION stack
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
# =============================================================================
#  nginx (TLS 80/443) -> client (Next.js) + backend (NestJS)
#  postgres / redis / minio — FAQAT ichki tarmoq (host portlari ochilmaydi).
#  Sirlar .env.production'da (yoki secret-manager orqali env injection).
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [clinic_net]

  redis:
    image: redis:7-alpine
    restart: always
    command: ['redis-server', '--appendonly', 'yes', '--requirepass', '${REDIS_PASSWORD}']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [clinic_net]

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [clinic_net]

  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/${MINIO_BUCKET};
      mc anonymous set none local/${MINIO_BUCKET};
      exit 0;
      "
    networks: [clinic_net]

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      # Maydon shifrlash (Phase 9B) — base64(32 bayt). YO'QOTMANG!
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      FIELD_ENCRYPTION_KEY_ID: ${FIELD_ENCRYPTION_KEY_ID:-k1}
      FIELD_ENCRYPTION_KEYS_OLD: ${FIELD_ENCRYPTION_KEYS_OLD:-}
      CORS_ORIGINS: ${PUBLIC_URL}
      APP_PUBLIC_URL: ${PUBLIC_URL}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENV: ${SENTRY_ENV:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      METRICS_ENABLED: 'true'
      # To'lov provayderlari (Payme/Click) + SMS/Telegram sirlari — .env.production'dan
      PAYME_MERCHANT_ID: ${PAYME_MERCHANT_ID:-}
      PAYME_MERCHANT_KEY: ${PAYME_MERCHANT_KEY:-}
      CLICK_SERVICE_ID: ${CLICK_SERVICE_ID:-}
      CLICK_SECRET_KEY: ${CLICK_SECRET_KEY:-}
      CLICK_MERCHANT_ID: ${CLICK_MERCHANT_ID:-}
      CLICK_MERCHANT_USER_ID: ${CLICK_MERCHANT_USER_ID:-}
      ESKIZ_EMAIL: ${ESKIZ_EMAIL:-}
      ESKIZ_PASSWORD: ${ESKIZ_PASSWORD:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_WEBHOOK_DOMAIN: ${TELEGRAM_WEBHOOK_DOMAIN:-}
    networks: [clinic_net]

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: always
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3001
      # BFF -> backend ichki tarmoq orqali (brauzer ko'rmaydi).
      BACKEND_INTERNAL_URL: http://backend:3000
      # HTTPS orqasida — cookie Secure majburiy.
      COOKIE_SECURE: 'true'
    networks: [clinic_net]

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - client
      - backend
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/www:/var/www/certbot
    networks: [clinic_net]

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  clinic_net:
    driver: bridge
